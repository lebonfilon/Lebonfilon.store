  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:200; display:none; align-items:flex-end; }

  .modal {

  }
  .modal-img { width:100%; max-height:260px; object-fit:cover; }
  .modal-body { padding:1.2rem; }
  .modal-name { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; letter-spacing:0.04em; color:#fff; margin-bottom:0.7rem; line-height:1.1; }

  .modal-pct { font-size:0.72rem; font-weight:700; color:var(--red); background:rgba(231,76,60,0.15); padding:0.2rem 0.5rem; margin-left:auto; border-radius:2px; }
  .modal-btn-cmd {

  .panier-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:300; display:none; align-items:flex-end; }

</style>

    <div id="panier-items"></div>
    <div id="panier-footer" style="display:none">
      <div class="panier-total">
        <span>Total</span>
        <span class="total-val" id="panier-total-val"></span>
      </div>
      <button class="btn-checkout" onclick="commanderPanier()">✅ Commander tout le panier</button>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-icon">✅</div>
    <div class="confirm-title">Commande envoyée !</div>
    <div class="confirm-text" id="confirm-text"></div>
    <button class="confirm-ok" onclick="closeConfirm()">OK, super !</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// ── LOGO ──────────────────────────────────────────────────────────────────────
(function() {
  const wrap = document.getElementById("logo-wrap");
  if (LOGO_IMAGE) {
    wrap.innerHTML = `<img class="logo-img" src="${LOGO_IMAGE}" alt="${NOM_BOUTIQUE}">`;
  } else {
    wrap.innerHTML = `<span class="logo-emoji">${LOGO_EMOJI}</span><span class="logo-text">${NOM_BOUTIQUE}</span>`;
  }
})();

// ── HERO ──────────────────────────────────────────────────────────────────────
document.getElementById("hero-img").src = BANNIERE;
document.getElementById("hero-tag").textContent = BANNIERE_TAG;
document.getElementById("hero-h1").innerHTML = `${BANNIERE_TITRE}<br><em>${BANNIERE_SOUS}</em>`;
document.getElementById("hero-p").textContent = BANNIERE_DESC;

// ── CATEGORIES DYNAMIQUES ────────────────────────────────────────────────────
(function() {
  const catsUsed = ["tous", ...new Set(PRODUITS.map(p => p.cat))];
  const wrap = document.getElementById("cats-wrap");
  wrap.innerHTML = catsUsed.map((cat, i) =>
    `<button class="cat-btn${i===0?" active":""}" onclick="filterCat('${cat}',this)">${CATEGORIES[cat] || cat}</button>`
  ).join("");
})();

// ── GRILLE ────────────────────────────────────────────────────────────────────
function renderGrid(cat) {
  const liste = cat === "tous" ? PRODUITS : PRODUITS.filter(p => p.cat === cat);
  document.getElementById("section-title").textContent =
    (CATEGORIES[cat] || cat) + " (" + liste.length + ")";
  document.getElementById("grid").innerHTML = liste.map(p => `
    <div class="card" onclick="openModal('${p.id}')">
      <div class="card-img-wrap">
        <img class="card-img" src="${p.img}" alt="${p.nom}" loading="lazy">
        <span class="card-promo">Promo!</span>
      </div>
      <div class="card-body">
        <div class="card-name">${p.nom}</div>
        <div class="card-prices">
          <span class="price-now">${p.prix}</span>
          <span class="price-old">${p.ancien}</span>
          <span class="price-pct">${p.pct}</span>
        </div>
        <button class="btn-add" onclick="event.stopPropagation();ajouterPanier('${p.id}')">🛒 Ajouter</button>
      </div>
    </div>
  `).join("");
}

function filterCat(cat, btn) {
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderGrid(cat);
}

renderGrid("tous");

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openModal(id) {
  const p = PRODUITS.find(x => x.id === id);
  if (!p) return;
  document.getElementById("modal-img").src = p.img;
  document.getElementById("modal-name").textContent = p.nom;
  document.getElementById("modal-desc").textContent = p.desc;
  document.getElementById("modal-price-now").textContent = p.prix;
  document.getElementById("modal-price-old").textContent = p.ancien;
  document.getElementById("modal-pct").textContent = p.pct;
  document.getElementById("modal-btn-cmd").onclick = () => commander(p);
  document.getElementById("modal-btn-panier").onclick = () => { ajouterPanier(p.id); closeModal(); };
  document.getElementById("modal-overlay").classList.add("open");
}
function closeModalOut(e) { if (e.target.id==="modal-overlay") closeModal(); }
function closeModal() { document.getElementById("modal-overlay").classList.remove("open"); }

// ── PANIER ────────────────────────────────────────────────────────────────────
let panier = [];

function ajouterPanier(id) {
  const p = PRODUITS.find(x => x.id === id);
  if (!p) return;
  panier.push({...p});
  updateBadge();
  showToast("✅ Ajouté au panier !");
}

function updateBadge() {
  const b = document.getElementById("cart-badge");
  b.textContent = panier.length;
  b.style.display = panier.length > 0 ? "flex" : "none";
}

function openPanier() {
  const el = document.getElementById("panier-items");
  const footer = document.getElementById("panier-footer");
  if (!panier.length) {
    el.innerHTML = '<div class="panier-empty">🛒 Ton panier est vide</div>';
    footer.style.display = "none";
  } else {
    el.innerHTML = panier.map((p,i) => `
      <div class="panier-item">
        <img class="panier-item-img" src="${p.img}" alt="${p.nom}">
        <div class="panier-item-info">
          <div class="panier-item-name">${p.nom}</div>
          <div class="panier-item-price">${p.prix}</div>
        </div>
        <button class="panier-item-del" onclick="supprimerItem(${i})">✕</button>
      </div>`).join("");
    document.getElementById("panier-total-val").textContent = calcTotal(panier);
    footer.style.display = "block";
  }
  document.getElementById("panier-overlay").classList.add("open");
}

function supprimerItem(i) { panier.splice(i,1); updateBadge(); openPanier(); }
function closePanier() { document.getElementById("panier-overlay").classList.remove("open"); }
function closePanierOut(e) { if (e.target.id==="panier-overlay") closePanier(); }

function calcTotal(liste) {
  const t = liste.reduce((a,p) => a + parseFloat(p.prix.replace(",",".").replace(" €","")), 0);
  return t.toFixed(2).replace(".",",") + " €";
}

// ── 🔔 COMMANDER ─────────────────────────────────────────────────────────────
function getUserName() {
  if (tg?.initDataUnsafe?.user) {
    const u = tg.initDataUnsafe.user;
    return (u.first_name||"") + (u.last_name?" "+u.last_name:"") + (u.username?" (@"+u.username+")":"");
  }
  return "Client";
}

function buildMsg(articles, total) {
  const user = getUserName();
  const heure = new Date().toLocaleString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
  const lignes = articles.map(a => "▸ "+a.nom+" — "+a.prix).join("\n");
  return `🔔 NOUVELLE COMMANDE — ${NOM_BOUTIQUE}\n\n`
       + `👤 Client : ${user}\n\n`
       + `🛒 Produit(s) :\n${lignes}\n\n`
       + `💰 Total : ${total}\n`
       + `🕐 ${heure}`;
}

function envoyerCommande(articles, total) {
  const msg = buildMsg(articles, total);
  window.open(`https://t.me/${ADMIN_USERNAME}?text=${encodeURIComponent(msg)}`, "_blank");
}

function commander(p) {
  closeModal();
  envoyerCommande([{nom:p.nom, prix:p.prix}], p.prix);
  document.getElementById("confirm-text").innerHTML =
    `<strong>${p.nom}</strong><br>${p.prix}<br><br>Un message a été envoyé au vendeur avec les détails. 📩`;
  document.getElementById("confirm-overlay").classList.add("open");
}

function commanderPanier() {
  if (!panier.length) return;
  const articles = panier.map(p => ({nom:p.nom, prix:p.prix}));
  const total = calcTotal(panier);
  closePanier();
  envoyerCommande(articles, total);
  document.getElementById("confirm-text").innerHTML =
    `<strong>${panier.length} article${panier.length>1?"s":""}</strong><br>`
    + `Total : <strong>${total}</strong><br><br>Un message a été envoyé au vendeur ! 📩`;
  panier = []; updateBadge();
  document.getElementById("confirm-overlay").classList.add("open");
}

function closeConfirm() { document.getElementById("confirm-overlay").classList.remove("open"); }

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}
</script>
</body>
</html>
